<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="form-box">
    <h2>Resident Registration</h2>
    <form>
        Name:<input type="text" placeholder="Full Name"><br>
        Flat:<input type="text" placeholder="Flat Number"><br>
        Email:<input type="email" placeholder="Email"><br>
        Mobile Number:<input type="text" placeholder="Mobile Number"><br>
        Password<input type="password" placeholder="Password"><br>
        Confirm Password:<input type="password" placeholder="Confirm Password"><br>
        <select>
            <option>Owner</option>
            <option>Tenant</option>
        </select><br>
        <button type="submit">Register</button>
    </form>
</div>
</body>
</html>
