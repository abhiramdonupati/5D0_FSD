<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4 bg-secondary">
    <h2 class="text-center mb-4">Student Dashboard</h2>
    <!-- Statistics Cards -->
    <div class="row text-center mb-4">
        <div class="col-md-3 mb-3">
            <div class="card bg-primary text-white">
                <div class="card-body">
                    <h5>Total Students</h5>
                    <h3>250</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h5>Present Students</h5>
                    <h3>220</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card bg-danger text-white">
                <div class="card-body">
                    <h5>Absent Students</h5>
                    <h3>30</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-3">
            <div class="card bg-warning">
                <div class="card-body">
                    <h5>Placements</h5>
                    <h3>180</h3>
                </div>
            </div>
        </div>
    </div>
    <!-- Search Box -->
    <div class="mb-3">
        <input type="text" class="form-control" placeholder="Search Student">
    </div>
    <!-- Student Table -->
    <div class="table-responsive">
        <table class="table table-bordered table-striped text-center">
            <thead class="table-dark">
                <tr>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Branch</th>
                    <th>Attendance</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>110</td>
                    <td>P.Rahul</td>
                    <td>CSE</td>
                    <td><span class="badge bg-success">95%</span></td>
                </tr>
                <tr>
                    <td>215</td>
                    <td>R.Priya</td>
                    <td>ECE</td>
                    <td><span class="badge bg-warning">80%</span></td>
                </tr>
                <tr>
                    <td>421</td>
                    <td>D.Kiran</td>
                    <td>MECHNICAL</td>
                    <td><span class="badge bg-danger">65%</span></td>
                </tr>
                <tr>
                    <td>303</td>
                    <td>T.Sahana</td>
                    <td>CIVIL</td>
                    <td><span class="badge bg-danger">65%</span></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
