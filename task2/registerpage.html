<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body{
        background-color:rgba(255, 174, 0, 0.781);
    }
</style>
<body>

<div class="container my-5 bg-light">
  <h2>Student Registration</h2>

  <form onsubmit="showSuccess(event)">

    <input class="form-control mb-2" placeholder="Student Name" required>
    <input class="form-control mb-2" placeholder="Email" type="email" required>
    <input class="form-control mb-2" placeholder="Mobile Number" required>

    <select class="form-control mb-2">
      <option>Gender</option>
      <option>Male</option>
      <option>Female</option>
    </select>

    <select class="form-control mb-2">
      <option>Select Course</option>
      <option>Web Development</option>
      <option>Python</option>
    </select>

    <textarea class="form-control mb-2" placeholder="Address"></textarea>

    <input type="file" class="form-control mb-2">

    <div class="form-check mb-2">
      <input type="checkbox" required> I agree to terms
    </div>

    <button class="btn btn-success">Submit</button>

  </form>

  <div id="msg" class="mt-3"></div>
</div>

<script>
function showSuccess(e){
  e.preventDefault();
  document.getElementById("msg").innerHTML =
    '<div class="alert alert-success">Registration Successful!</div>';
}
</script>

</body>
</html>
