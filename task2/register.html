<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: lightcoral;
        }

        .form-container {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h3 class="text-center mb-4">Student Registration Form</h3>

        <form class="needs-validation" novalidate>

            <!-- Full Name -->
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" required>
                <div class="invalid-feedback">Full Name is required</div>
            </div>

            <!-- Roll Number -->
            <div class="mb-3">
                <label class="form-label">Roll Number</label>
                <input type="text" class="form-control" required>
                <div class="invalid-feedback">Roll Number is required</div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text">@</span>
                    <input type="email" class="form-control" required>
                    <div class="invalid-feedback">Enter a valid email</div>
                </div>
            </div>

            <!-- Mobile Number -->
            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <div class="input-group">
                    <span class="input-group-text">+91</span>
                    <input type="tel" class="form-control" minlength="10" maxlength="10" required>
                    <div class="invalid-feedback">Enter 10 digit mobile number</div>
                </div>
            </div>

            <!-- Gender -->
            <div class="mb-3">
                <label class="form-label">Gender</label><br>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" required>
                    <label class="form-check-label">Male</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender">
                    <label class="form-check-label">Female</label>
                </div>
            </div>

            <!-- Branch -->
            <div class="mb-3">
                <label class="form-label">Branch</label>
                <select class="form-select" required>
                    <option value="">Select Branch</option>
                    <option>CSE</option>
                    <option>ECE</option>
                    <option>EEE</option>
                    <option>MECH</option>
                    <option>CIVIL</option>
                </select>
                <div class="invalid-feedback">Please select a branch</div>
            </div>

            <!-- DOB -->
            <div class="mb-3">
                <label class="form-label">Date of Birth</label>
                <input type="date" class="form-control" required>
                <div class="invalid-feedback">DOB is required</div>
            </div>

            <!-- Address -->
            <div class="mb-3">
                <label class="form-label">Address</label>
                <textarea class="form-control" rows="3" required></textarea>
                <div class="invalid-feedback">Address is required</div>
            </div>

            <!-- Upload Photo -->
            <div class="mb-3">
                <label class="form-label">Upload Photo</label>
                <input type="file" class="form-control" accept="image/*" required>
                <div class="invalid-feedback">Please upload a photo</div>
            </div>

            <!-- Terms -->
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" required>
                <label class="form-check-label">
                    I agree to Terms and Conditions
                </label>
                <div class="invalid-feedback">You must agree before submitting</div>
            </div>

            <!-- Submit Button -->
            <div class="row mt-3">
                <div class="col-sm-6 d-grid">
                    <button class="btn btn-primary" type="submit">
                        Register
                    </button>
                </div>
                <div class="col-sm-6 d-grid">
                    <a href="dashboard.html" class="btn btn-primary">
                        View Dashboard
                    </a>
                </div>
            </div>
        </form>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Validation Script -->
    <script>
        (() => {
            'use strict';
            const forms = document.querySelectorAll('.needs-validation');
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>
</body>

</html>
