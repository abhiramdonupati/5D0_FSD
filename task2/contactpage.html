<!DOCTYPE html>
<html>
<head>
<title>Contact</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body{
        background-color:rgba(47, 255, 68, 0.611);
    }
</style>
<body>
<div class="container my-5">
  <h2>Contact Us</h2>
  <form>
    <input class="form-control mb-2" placeholder="Name">
    <input class="form-control mb-2" placeholder="Email">
    <textarea class="form-control mb-2" placeholder="Message"></textarea>
    <button class="btn btn-primary">Send</button>
  </form>
  <div class="mt-4">
    <h5>Address</h5>
    <p>Hyderabad, India</p>
    <h5>Map</h5>
    <div class="bg-secondary text-white text-center p-5">
      Google Map Placeholder
    </div>
  </div>
</div>
</body>
</html>
